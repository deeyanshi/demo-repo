<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CarbonIQ</title>
  <link rel="stylesheet" href="css/material selector.css">
</head>

<body>

<div id="app">
  <div class="container">

    <h1 class="title">CarbonIQ</h1>
    <p class="subtitle">Embodied Carbon Material Selector</p>

    <label>Building Type</label>
    <select id="buildingType">
      <option>House</option>
      <option>Villa</option>
      <option>Apartments</option>
      <option>Office</option>
      <option>Mall</option>
      <option>School</option>
      <option>Hospital</option>
      <option>Warehouse</option>
      <option>Factory</option>
      <option>Green Building</option>
      <option>Eco Home</option>
    </select>

    <label>Budget (₹)</label>
    <input type="number" id="budget" placeholder="Enter Budget">

    <label>Carbon Limit (kg CO₂)</label>
    <input type="number" id="carbonLimit" placeholder="Enter Carbon Limit">

    <button onclick="calculate()">Find Best Materials</button>

    <div id="result"></div>

  </div>
</div>

<script src="javascript/data.js"></script>
<script src="javascript/material selector.js"></script>

</body>
</html>
