<!DOCTYPE html>
<html>
<head>
<title>Eco Knowledge Game</title>
<link rel="stylesheet" href="css/game.css">
</head>

<body>

<div class="container">

<h1>🌱 Eco Knowledge Challenge</h1>
<p class="tag">Test your sustainability knowledge!</p>

<div id="start-screen">
<button onclick="startGame()">Start Game</button>
</div>

<div id="game-screen" class="hide">

<h2 id="question">Question</h2>

<div id="answers">
<button class="answer-btn" onclick="checkAnswer(0)"></button>
<button class="answer-btn" onclick="checkAnswer(1)"></button>
<button class="answer-btn" onclick="checkAnswer(2)"></button>
<button class="answer-btn" onclick="checkAnswer(3)"></button>
</div>

<p id="score">Score: 0</p>

</div>

<div id="end-screen" class="hide">
<h2 id="final-score"></h2>
<button onclick="restartGame()">Try Again</button>
</div>

</div>

<script src="javascript/game.js"></script>
</body>
</html>
